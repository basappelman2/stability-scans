name: Lighthouse scans
on:
  schedule:
    - cron: '17 4 * * 1' # wekelijks, maandag 04:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm i -g lighthouse
      - name: Scan alle app-URL's
        run: |
          URLS="https://recepten.basappelman.nl https://herinneringen.basappelman.nl https://huishouden.basappelman.nl https://kennisbank.basappelman.nl https://braindump.basappelman.nl https://kijktracker.basappelman.nl https://boekentracker.basappelman.nl https://gametracker.basappelman.nl https://letsplay.basappelman.nl"
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          RESULTS='[]'
          for u in $URLS; do
            if lighthouse "$u" --quiet --chrome-flags="--headless --no-sandbox" --only-categories=performance,accessibility,best-practices,seo --output=json --output-path=/tmp/lh.json; then
              row=$(jq -c --arg u "$u" '{
                url:$u,
                performance:((.categories.performance.score // 0)*100|round),
                accessibility:((.categories.accessibility.score // 0)*100|round),
                best_practices:((.categories["best-practices"].score // 0)*100|round),
                seo:((.categories.seo.score // 0)*100|round),
                kb:(((.audits["total-byte-weight"].numericValue // 0)/1024)|round)
              }' /tmp/lh.json)
              RESULTS=$(echo "$RESULTS" | jq -c --argjson r "$row" '. + [$r]')
            fi
          done
          mkdir -p scans
          HIST='[]'; [ -f scans/scores.json ] && HIST=$(cat scans/scores.json)
          echo "$HIST" | jq --arg ts "$TS" --argjson res "$RESULTS" '. + [{ts:$ts, results:$res}] | .[-12:]' > scans/scores.json
      - name: Commit resultaten
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scans/scores.json
          git commit -m "lighthouse scores $(date -u +%F)" || echo "geen wijziging"
          git push
